<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Vehicle</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="customer-page">
        <div class="rental-header">
            <h2>🚘 Edit Vehicle</h2>
        </div>

        <div class="customer-form-card">
            <form method="POST">
                <div class="form-group">
                    <label>Brand</label>
                    <input type="text" name="brand" value="{{ vehicle[1] }}" required>
                </div>

                <div class="form-group">
                    <label>Model</label>
                    <input type="text" name="model" value="{{ vehicle[2] }}" required>
                </div>
                
                <div class="form-group">
                    <label>Price Per Day (₹)</label>
                    <input type="number" name="price_per_day" value="{{ vehicle[8] }}" required>
                </div>

                <div class="form-group">
                    <label>Vehicle Status</label>
                    <select name="status">
                        <option value="Available" {% if vehicle[9]=='Available' %}selected{% endif %}>
                            Available
                        </option>
                        <option value="Booked" {% if vehicle[9]=='Booked' %}selected{% endif %}>
                            Booked
                        </option>
                        <option value="Maintenance" {% if vehicle[9]=='Maintenance' %}selected{% endif %}>
                            Maintenance
                        </option>
                    </select>
                </div>

                <div class="form-buttons">
                    <a href="/vehicles" class="back-btn">
                        ⬅ Back
                    </a>
                    <button type="submit" class="save-customer-btn">
                        🚗 Update Vehicle
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
