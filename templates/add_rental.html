<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Rental</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <div class="customer-page">

        <div class="rental-header">

            <h2>📅 Add New Rental</h2>

        </div>

        <div class="customer-form-card">

            <form method="POST">

                <div class="form-group">

                    <label>Select Customer</label>

                    <select name="customer_id" required>

                        <option value="">
                            Select Customer
                        </option>

                        {% for c in customers %}

                        <option value="{{c[0]}}">
                            {{c[1]}}
                        </option>

                        {% endfor %}

                    </select>

                </div>

                <div class="form-group">

                    <label>Select Vehicle</label>

                    <select name="vehicle_id" required>

                        <option value="">
                            Select Vehicle
                        </option>

                        {% for v in vehicles %}

                        <option value="{{v[0]}}">
                            {{v[1]}} {{v[2]}}
                        </option>

                        {% endfor %}

                    </select>

                </div>

                <div class="form-group">

                    <label>Pickup Date</label>

                    <input type="date"
                           name="pickup_date"
                           required>

                </div>

                <div class="form-group">

                    <label>Return Date</label>

                    <input type="date"
                           name="return_date"
                           required>

                </div>

                <div class="form-buttons">

                    <a href="/rentals"
                       class="back-btn">

                        ⬅ Back

                    </a>

                    <button type="submit"
                            class="save-customer-btn vehicle-update-btn">

                        📅 Create Rental

                    </button>

                </div>

            </form>

        </div>

    </div>

</body>

</html>
