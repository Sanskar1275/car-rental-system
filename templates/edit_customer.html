<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Edit Customer</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <div class="customer-page">

        <div class="rental-header">

            <h2>✏️ Edit Customer</h2>

        </div>

        <div class="customer-form-card">

            <form method="POST">

                <div class="form-group">

                    <label>Full Name</label>

                    <input type="text"
                           name="full_name"
                           value="{{customer[1]}}"
                           required>

                </div>

                <div class="form-group">

                    <label>Email Address</label>

                    <input type="email"
                           name="email"
                           value="{{customer[2]}}"
                           required>

                </div>

                <div class="form-group">

                    <label>Phone Number</label>

                    <input type="text"
                           name="phone"
                           value="{{customer[3]}}"
                           required>

                </div>

                <div class="form-group">

                    <label>Driving License Number</label>

                    <input type="text"
                           name="license_number"
                           value="{{customer[4]}}"
                           required>

                </div>

                <div class="form-group">

                    <label>Address</label>

                    <textarea name="address"
                              rows="4"
                              required>{{customer[5]}}</textarea>

                </div>

                <div class="form-buttons">

                    <a href="/customers"
                       class="back-btn">

                        ⬅ Back

                    </a>

                    <button type="submit"
                            class="save-customer-btn">

                        ✏️ Update Customer

                    </button>

                </div>

            </form>

        </div>

    </div>

</body>

</html>
