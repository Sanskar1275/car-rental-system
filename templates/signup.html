<!DOCTYPE html>
<html>
<head>

<title>Signup</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

<div class="row justify-content-center mt-5">

<div class="col-md-5">

<div class="card shadow">

<div class="card-body">

<h3 class="text-center mb-4">

Signup

</h3>

<form method="POST">

<input
name="fullname"
class="form-control mb-3"
placeholder="Full Name"
required>

<input
type="email"
name="email"
class="form-control mb-3"
placeholder="Email"
required>

<input
name="phone"
class="form-control mb-3"
placeholder="Phone"
required>

<input
type="password"
name="password"
class="form-control mb-3"
placeholder="Password"
required>

<button
class="btn btn-success w-100">

Register

</button>

</form>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
